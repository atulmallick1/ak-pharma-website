<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="AK Pharma Group">

  <!-- Shield emblem -->
  <g>
    <!-- Outer shield -->
    <path d="M 30 4 L 52 11 L 52 33 Q 52 50 30 60 Q 8 50 8 33 L 8 11 Z"
          fill="#1E56A0"/>
    <!-- Inner shield ring highlight -->
    <path d="M 30 9 L 47 15 L 47 33 Q 47 47 30 56 Q 13 47 13 33 L 13 15 Z"
          fill="none" stroke="#7AB3E8" stroke-width="1" opacity="0.7"/>
    <!-- Horizontal bar of cross (pharma) -->
    <rect x="21" y="29" width="18" height="4" rx="1" fill="#FFFFFF"/>
    <!-- Vertical bar of cross (pharma) -->
    <rect x="28" y="22" width="4" height="18" rx="1" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <text
    x="66" y="28"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="21"
    fill="#FFFFFF"
    letter-spacing="2.5"
  >AK PHARMA</text>

  <!-- Separator rule -->
  <line x1="66" y1="35" x2="238" y2="35" stroke="#4A8FD9" stroke-width="0.75"/>

  <!-- Subtext -->
  <text
    x="67" y="50"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="500"
    font-size="10"
    fill="#7AB3E8"
    letter-spacing="5"
  >GROUP</text>

  <!-- Defence tagline dots -->
  <circle cx="118" cy="57" r="1.5" fill="#4A8FD9" opacity="0.6"/>
  <circle cx="126" cy="57" r="1.5" fill="#4A8FD9" opacity="0.6"/>
  <circle cx="134" cy="57" r="1.5" fill="#4A8FD9" opacity="0.6"/>

</svg>
